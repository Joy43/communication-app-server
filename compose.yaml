services:
  caddy:
    profiles: ["prod"]
    image: caddy:2-alpine
    container_name: ${PACKAGE_NAME}_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "caddy validate --config /etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default

  coturn:
    profiles: ["prod"]
    image: instrumentisto/coturn:latest
    container_name: ${PACKAGE_NAME}_coturn
    restart: always
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "5349:5349/tcp"
      - "5349:5349/udp"
    env_file:
      - .env
    environment:
      - TURN_USERS=${TURN_USERS}
      - TURN_REALM=${PACKAGE_NAME}_turn
      - TURN_VERBOSE=1
      - TURN_LT_CREDENTIALS=1
      - EXTERNAL_IP=${EXTERNAL_IP}
    command: >
      -n
      --log-file=stdout
      --min-port=49152
      --max-port=65535
      --no-stdout-log
      --user=${TURN_USERS}
      --realm=${PACKAGE_NAME}_turn
      --external-ip=${EXTERNAL_IP}
    healthcheck:
      test: ["CMD-SHELL", "nc -zv -w 2 127.0.0.1 3478 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - default

  server:
    profiles: ["prod"]
    platform: linux/amd64
    image: ${DOCKER_USERNAME}/${PACKAGE_NAME}:${PACKAGE_VERSION}
    container_name: ${PACKAGE_NAME}_api
    restart: always
    user: "0:0"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/${PACKAGE_NAME}_db
      REDIS_HOST: redis-master
      REDIS_PORT: 6379
      BASE_URL: ${BASE_URL}
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL}
      SUPER_ADMIN_PASS: ${SUPER_ADMIN_PASS}
      AWS_REGION: ${AWS_REGION}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      TURN_USERS: ${TURN_USERS}
      EXTERNAL_IP: ${EXTERNAL_IP}
      UPLOAD_DIR: /var/www/uploads
      UPLOAD_PATH: ./uploads
    ports:
      - "5050:3000"
    depends_on:
      db:
        condition: service_healthy
      redis-master:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        mkdir -p /app/uploads /app/tmp /var/www/uploads
        chmod -R 777 /app/uploads /app/tmp /var/www/uploads
        npm start
    volumes:
      - /var/www/uploads:/var/www/uploads
      - /var/www/tmp:/var/www/tmp
     
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/docs || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    networks:
      - default

  db:
    profiles: ["dev", "prod"]
    image: postgres:17
    container_name: ${PACKAGE_NAME}_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ${PACKAGE_NAME}_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  redis-master:
    profiles: ["dev", "prod"]
    image: redis:7-alpine
    container_name: ${PACKAGE_NAME}_redis-master
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--bind",
        "0.0.0.0",
        "--protected-mode",
        "no",
      ]
    ports:
      - "22376:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - default

  redis-replica:
    profiles: ["prod"]
    image: redis:7-alpine
    container_name: ${PACKAGE_NAME}_redis-replica
    command:
      [
        "redis-server",
        "--replicaof",
        "redis-master",
        "6379",
        "--bind",
        "0.0.0.0",
        "--protected-mode",
        "no",
      ]
    ports:
      - "22377:6379"
    depends_on:
      - redis-master
    restart: always
    networks:
      - default

volumes:
  db_data:
  redis_data:
  files-data:
  temp-data:
  caddy_data:
  caddy_config:

networks:
  default:
    name: ${PACKAGE_NAME}_network
    driver: bridge
    labels:
      - "project=${PACKAGE_NAME}"
