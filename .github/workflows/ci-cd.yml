name: Format, Build, Docker & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci-check:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install
      
      - name: Format Check
        run: npm run format
        continue-on-error: true

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Validate Prisma Schema
        run: npm run db:validate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"

  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: ci-check
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/${{ secrets.PACKAGE_NAME }}:buildcache,mode=max
          build-args: |
            DATABASE_URL=postgresql://dummy:dummy@localhost:5432/dummy

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
  
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            cd ~/server
            
            # Pull latest Docker image
            docker compose --profile prod pull
            
            # Restart services
            docker compose --profile prod down --remove-orphans
            docker compose --profile prod up -d
            
            # Wait for services to start
            echo "Waiting for services to start..."
            sleep 20
            
            # Check container status
            if docker compose ps | grep -q "Up"; then
              echo " Deployment successful!"
              docker compose logs --tail=30 server
            else
              echo "❌ Deployment failed!"
              docker compose logs --tail=100 server
              exit 1
            fi
            
            # Cleanup old images
            docker system prune -f
            docker image prune -af --filter "until=24h"